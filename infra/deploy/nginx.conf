worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/html application/javascript text/css application/json image/svg+xml application/xml;
    # Brotli не подключён — стандартный образ nginx:1.27-alpine не собран с ngx_brotli;
    # gzip даёт большую часть выигрыша, доп. модуль пока не оправдан (Фаза 5, опционально).

    limit_req_zone $binary_remote_addr zone=routing:10m rate=10r/s;

    server {
        # haproxy передаёт сюда сырой TCP по SNI gpx.atemirov.ru (порт 443 у haproxy,
        # сюда трафик приходит уже нашим, TLS терминируем здесь) — см. infra/haproxy/haproxy.cfg
        listen 127.0.0.1:8443 ssl;
        http2 on;
        server_name gpx.atemirov.ru;

        ssl_certificate     /etc/letsencrypt/live/gpx.atemirov.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gpx.atemirov.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index app.html;

        location /_app/immutable/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~ \.(html|webmanifest)$ {
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Прочая статика вне content-hashed _app/immutable (иконки, favicon и т.п.) —
        # умеренный кэш, не immutable (имена файлов не хэшируются).
        location ~ \.(png|svg|ico|jpg|jpeg|webp|xml)$ {
            add_header Cache-Control "public, max-age=86400";
        }

        # BRouter — self-hosted, см. infra/brouter/
        location /routing/ {
            limit_req zone=routing burst=20 nodelay;
            proxy_pass http://127.0.0.1:17777/;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        error_page 404 /404.html;
    }
}
