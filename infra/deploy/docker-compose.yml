services:
  nginx:
    image: nginx:1.27-alpine
    container_name: gpx_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # BRouter слушает 127.0.0.1:17777 на хосте — нужен доступ к сети хоста
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
