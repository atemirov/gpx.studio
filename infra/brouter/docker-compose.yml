services:
  brouter:
    # :latest на момент проверки (2026-07) несовместим по формату сегментов
    # с текущими .rd5 на brouter.de (lookups.dat version mismatch) — используем :nightly
    image: ghcr.io/abrensch/brouter:nightly
    container_name: gpx_brouter
    restart: unless-stopped
    # Порт публикуем только на loopback — наружу торчит через reverse-proxy
    # основного nginx сайта (infra/deploy/nginx.conf, location /routing/).
    ports:
      - "127.0.0.1:17777:17777"
    volumes:
      - ./segments4:/segments4:ro
      # ВАЖНО: CUSTOMPROFILESPATH (/customprofiles) в этой сборке образа не работает —
      # RouteServer игнорирует customProfileDir и всегда ищет profile=<имя> только в
      # PROFILESPATH. Поэтому кастомные профили кладём прямо в переопределённый /profiles2
      # (это КОПИЯ штатных профилей образа + наши добавленные, не auto-sync — при обновлении
      # образа возможен дрейф, см. infra/brouter/README.md).
      - ./profiles2:/profiles2:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
